<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estrategia SSO Codelco | Presentacion Interactiva</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #0a1628 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    .screen { min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .screen.hidden { display: none; }
    .logo-container { margin-bottom: 30px; }
    .logo-text {
      font-size: 36px;
      font-weight: 900;
      color: #FF6B00;
      letter-spacing: 8px;
    }
    .title-main {
      font-size: 40px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 15px;
      color: #FF6B00;
      text-shadow: 0 0 30px rgba(255,107,0,0.5);
    }
    .subtitle-main {
      font-size: 18px;
      text-align: center;
      color: #b0c4de;
      max-width: 700px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .btn {
      padding: 14px 40px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #FF6B00 0%, #E65100 100%);
      color: white;
      box-shadow: 0 8px 30px rgba(255,107,0,0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255,107,0,0.6); }
    .btn-secondary {
      background: transparent;
      color: #FF6B00;
      border: 2px solid #FF6B00;
    }
    .btn-secondary:hover { background: #FF6B00; color: white; }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin: 16px 0;
      border: 1px solid rgba(255,107,0,0.2);
    }
    .card-title { color: #FF6B00; font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .card-text { color: #e0e0e0; font-size: 15px; line-height: 1.6; }
    .video-container {
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      margin: 20px 0;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .video-container iframe { width: 100%; height: 100%; border: none; }
    .pillars-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 20px 0; }
    .pillar-card {
      background: rgba(255,107,0,0.08);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      border: 1px solid rgba(255,107,0,0.3);
      transition: all 0.3s ease;
    }
    .pillar-card:hover { transform: translateY(-5px); border-color: #FF6B00; }
    .pillar-icon { font-size: 42px; margin-bottom: 16px; }
    .pillar-title { color: #FF6B00; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .pillar-text { color: #c0c0c0; font-size: 14px; line-height: 1.5; }
    .quiz-options { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 20px 0; }
    .quiz-option {
      padding: 16px 24px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,107,0,0.3);
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }
    .quiz-option:hover { background: rgba(255,107,0,0.15); border-color: #FF6B00; }
    .quiz-option.correct { background: rgba(46,185,67,0.3); border-color: #2EB943; color: #2EB943; }
    .quiz-option.incorrect { background: rgba(230,57,70,0.3); border-color: #E63946; color: #E63946; }
    .feedback { margin-top: 16px; padding: 16px; border-radius: 12px; font-size: 15px; }
    .feedback.correct { background: rgba(46,185,67,0.2); border: 1px solid #2EB943; color: #2EB943; }
    .feedback.incorrect { background: rgba(230,57,70,0.2); border: 1px solid #E63946; color: #E63946; }
    .decision-tree { max-width: 900px; margin: 20px 0; }
    .decision-node {
      background: rgba(255,107,0,0.1);
      border: 2px solid #FF6B00;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .decision-question { color: #FF6B00; font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .decision-options { display: flex; flex-direction: column; gap: 12px; }
    .decision-btn {
      padding: 14px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,107,0,0.4);
      border-radius: 12px;
      color: #e0e0e0;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .decision-btn:hover { background: rgba(255,107,0,0.15); border-color: #FF6B00; }
    .decision-result {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      border-left: 4px solid #FF6B00;
    }
    .result-title { color: #FF6B00; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .result-text { color: #c0c0c0; font-size: 14px; line-height: 1.6; }
    .score-display {
      font-size: 72px;
      font-weight: 900;
      color: #FF6B00;
      margin: 20px 0;
    }
    .score-message { font-size: 20px; color: #b0c4de; margin-bottom: 30px; }
    .info-box {
      background: rgba(255,107,0,0.05);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255,107,0,0.3);
    }
    .info-box h4 { color: #FF6B00; margin-bottom: 10px; }
    .info-box p { color: #c0c0c0; font-size: 14px; line-height: 1.5; }
    .progress-bar {
      width: 100%;
      max-width: 400px;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin: 20px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B00, #E65100);
      transition: width 0.3s ease;
    }
    .nav-dots { display: flex; gap: 8px; margin-top: 20px; }
    .nav-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-dot.active { background: #FF6B00; transform: scale(1.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Datos de la estrategia SSO Codelco
    const STRATEGY_DATA = {
      title: "Estrategia Corporativa de Seguridad y Salud Ocupacional",
      period: "2021-2024",
      pillars: [
        {
          id: 1,
          icon: "🎯",
          title: "Cultura de Seguridad",
          desc: "Fomentar una cultura donde cada trabajador se sienta responsable de su seguridad y la de sus compañeros, con compromiso desde la dirección hasta el último nivel operativo."
        },
        {
          id: 2,
          icon: "📊",
          title: "Gestión de Riesgos",
          desc: "Identificar, evaluar y controlar sistemáticamente todos los riesgos presentes en las operaciones, aplicando metodologías estandarizadas."
        },
        {
          id: 3,
          icon: "🏥",
          title: "Salud Ocupacional",
          desc: "Prevenir enfermedades profesionales y promover la salud integral de los trabajadores mediante programas de vigilancia y bienestar."
        },
        {
          id: 4,
          icon: "🤝",
          title: "Participación y Compromiso",
          desc: "Involucrar activamente a todos los niveles de la organización en la toma de decisiones sobre seguridad, fortaleciendo el compromiso colectivo."
        }
      ],
      quiz: [
        {
          id: 1,
          question: "¿Cuál es el principal objetivo de la nueva estrategia SSO de Codelco?",
          options: ["Reducir costos operativos", "Lograr Cero Daño a las Personas", "Aumentar la producción", "Mejorar la imagen corporativa"],
          correct: 1,
          feedback: "Correcto. El objetivo principal es alcanzar Cero Daño a las Personas, priorizando la vida y la salud de todos los trabajadores."
        },
        {
          id: 2,
          question: "¿Cuántos pilares fundamentales tiene la estrategia SSO?",
          options: ["3 pilares", "4 pilares", "5 pilares", "6 pilares"],
          correct: 1,
          feedback: "Correcto. La estrategia se basa en 4 pilares: Cultura de Seguridad, Gestión de Riesgos, Salud Ocupacional y Participación y Compromiso."
        },
        {
          id: 3,
          question: "¿Qué significa SSO en el contexto de Codelco?",
          options: ["Seguridad Social Ocupacional", "Sistema de Seguridad Operativa", "Seguridad y Salud Ocupacional", "Servicio de Seguridad Organizacional"],
          correct: 2,
          feedback: "Correcto. SSO significa Seguridad y Salud Ocupacional, abarcando tanto la prevención de accidentes como el cuidado de la salud de los trabajadores."
        },
        {
          id: 4,
          question: "¿Quién es responsable de la seguridad en el trabajo?",
          options: ["Solo el supervisor", "Solo el trabajador", "Solo el departamento de seguridad", "Todos los miembros de la organización"],
          correct: 3,
          feedback: "Correcto. La seguridad es responsabilidad de todos, desde la dirección hasta cada trabajador, en un compromiso compartido."
        },
        {
          id: 5,
          question: "¿Qué se busca con la cultura de seguridad?",
          options: ["Cumplir con normas legales", "Que cada persona se sienta responsable de su seguridad y la de otros", "Reducir multas", "Mejorar indicadores"],
          correct: 1,
          feedback: "Correcto. Se busca que cada trabajador internalice la seguridad como un valor personal y se preocupe activamente por la de sus compañeros."
        }
      ],
      decisions: [
        {
          id: 1,
          question: "Un trabajador identifica un riesgo en su área de trabajo. ¿Qué debe hacer?",
          options: [
            { text: "Ignorarlo, no es su responsabilidad", result: "incorrect", title: "Respuesta Incorrecta", message: "Todos los trabajadores deben reportar riesgos. Ignorarlos pone en peligro a todos. Debe informar inmediatamente a su supervisor." }
          ]
        }
      ]
    };
    
    // Componente: Pantalla de Bienvenida
    function WelcomeScreen({ onStart }) {
      return (
        <div className="screen">
          <div className="logo-container">
            <div className="logo-text">CODELCO</div>
          </div>
          <h1 className="title-main">Estrategia Corporativa de Seguridad y Salud Ocupacional</h1>
          <p className="subtitle-main">Presentación Interactiva - Período 2021-2024<br/>Conoce los pilares fundamentales que guían nuestra cultura de seguridad</p>
          <button className="btn btn-primary" onClick={onStart}>Comenzar</button>
          <div className="info-box" style={{maxWidth: '600px', marginTop: '30px'}}>
            <h4>¿Qué aprenderás?</h4>
            <p>• Los 4 pilares de la estrategia SSO</p>
            <p>• Videos interactivos con situaciones reales</p>
            <p>• Árboles de decisión para aplicar lo aprendido</p>
            <p>• Evaluación de conocimientos</p>
          </div>
        </div>
      );
    }

    // Componente: Pantalla de Video
    function VideoScreen({ onNext }) {
      const [videoWatched, setVideoWatched] = useState(false);
      const [answer, setAnswer] = useState(null);

      const handleAnswer = (isCorrect) => {
        setAnswer(isCorrect);
        setVideoWatched(true);
      };

      return (
        <div className="screen">
          <h2 className="title-main" style={{fontSize: '32px'}}>Contexto de la Estrategia</h2>
          <p className="subtitle-main">Antes de continuar, mira este video sobre la importancia de la seguridad en las operaciones mineras</p>
          <div className="video-container">
            <iframe src="https://www.youtube.com/embed/6hrg2Ys3nmE" title="Estrategia SSO Codelco" allowFullScreen></iframe>
          </div>
          <div className="card" style={{maxWidth: '600px'}}>
            <p className="card-title">¿Comprendiste el mensaje principal del video?</p>
            {!answer ? (
              <div style={{display: 'flex', gap: '12px', marginTop: '16px'}}>
                <button className="btn btn-primary" onClick={() => handleAnswer(true)}>Sí, lo entendí</button>
                <button className="btn btn-secondary" onClick={() => handleAnswer(false)}>Necesito volver a verlo</button>
              </div>
            ) : answer ? (
              <div className="feedback correct" style={{marginTop: '16px'}}>
                ✓ ¡Excelente! Has comprendido los conceptos clave de la estrategia SSO.
              </div>
            ) : (
              <div className="feedback incorrect" style={{marginTop: '16px'}}>
                Te recomendamos volver a ver el video para reforzar los conceptos antes de continuar.
              </div>
            )}
          </div>
          {answer && (
            <button className="btn btn-primary" onClick={onNext} style={{marginTop: '20px'}}>Continuar</button>
          )}
        </div>
      );
    }

    // Componente: Pilares de la Estrategia
    function PillarsScreen({ onNext }) {
      return (
        <div className="screen">
          <h2 className="title-main" style={{fontSize: '32px'}}>Los 4 Pilares Fundamentales</h2>
          <p className="subtitle-main">La estrategia SSO de Codelco se sustenta en cuatro pilares que guían todas nuestras acciones</p>
          <div className="pillars-grid">
            {STRATEGY_DATA.pillars.map(pillar => (
              <div className="pillar-card" key={pillar.id}>
                <div className="pillar-icon">{pillar.icon}</div>
                <h3 className="pillar-title">{pillar.title}</h3>
                <p className="pillar-text">{pillar.desc}</p>
              </div>
            ))}
          </div>
          <div className="info-box" style={{maxWidth: '600px'}}>
            <h4>Objetivo 2021-2024</h4>
            <p>Lograr Cero Daño a las Personas mediante la implementación consistente de estos pilares en todas las divisiones de Codelco, con el compromiso de cada trabajador y líder.</p>
          </div>
          <button className="btn btn-primary" onClick={onNext}>Continuar al Árbol de Decisión</button>
        </div>
      );
    }
    
    // Componente: Árbol de Decisión
    function DecisionTreeScreen({ onNext }) {
      const [currentNode, setCurrentNode] = useState(null);
      const [selectedOption, setSelectedOption] = useState(null);
      const [completed, setCompleted] = useState(false);

      const nodes = [
        {
          id: 1,
          question: "Estás en el área de trabajo y ves que un compañero no está usando su EPP (Equipo de Protección Personal) completo. ¿Qué haces?",
          options: [
            { text: "Lo ignoro, cada uno es responsable de su seguridad", nextNode: 2, feedback: "incorrect" },
            { text: "Le recuerdo amablemente que debe usarlo", nextNode: 3, feedback: "correct" },
            { text: "Lo reporto inmediatamente al supervisor", nextNode: 3, feedback: "correct" }
          ]
        },
        {
          id: 2,
          question: "Resultado: Ignorar la situación de riesgo",
          result: {
            title: "Decisión Incorrecta",
            message: "En Codelco, la seguridad es responsabilidad de TODOS. Ignorar que un compañero no usa su EPP puede tener consecuencias graves. Debes siempre intervenir de forma respetuosa o reportar la situación."
          },
          options: [{ text: "Volver a intentar", nextNode: 1 }]
        },
        {
          id: 3,
          question: "Resultado: Interviniste correctamente",
          result: {
            title: "Decisión Correcta",
            message: "¡Muy bien! Has actuado correctamente. En la cultura de seguridad de Codelco, cuidarnos entre todos es fundamental. Ya sea recordando el uso del EPP o reportando la situación, demuestras compromiso con la seguridad de tu equipo."
          },
          options: [{ text: "Continuar", nextNode: 4 }]
        },
        {
          id: 4,
          question: "Identificas una condición insegura en tu área de trabajo (ej: piso mojado, herramienta dañada). ¿Cuál es la acción correcta?",
          options: [
            { text: "Continúo trabajando, ya me acostumbré", nextNode: 5, feedback: "incorrect" },
            { text: "Informo la condición y ayudo a corregirla", nextNode: 6, feedback: "correct" },
            { text: "Espero a que llegue el turno siguiente", nextNode: 5, feedback: "incorrect" }
          ]
        },
        {
          id: 5,
          question: "Resultado: No actuaste sobre la condición insegura",
          result: {
            title: "Decisión Incorrecta",
            message: "Las condiciones inseguras no se normalizan. En la estrategia SSO de Codelco, cada trabajador debe actuar proactivamente para eliminar riesgos. Acostumbrarse a una condición insegura puede llevar a accidentes graves."
          },
          options: [{ text: "Volver a intentar", nextNode: 4 }]
        },
        {
          id: 6,
          question: "Resultado: Actuaste correctamente sobre la condición insegura",
          result: {
            title: "Decisión Correcta",
            message: "¡Excelente! Has demostrado una actitud proactiva de seguridad. Informar y corregir condiciones inseguras es parte fundamental de la gestión de riesgos en Codelco. Esta es la cultura que queremos fortalecer."
          },
          options: [{ text: "Finalizar", nextNode: null, onComplete: true }]
        }
      ];

      const handleOptionClick = (option) => {
        setSelectedOption(option);
        const next = nodes.find(n => n.id === option.nextNode);
        if (next) setCurrentNode(next);
        if (option.onComplete) setCompleted(true);
      };

      if (completed) {
        return (
          <div className="screen">
            <h2 className="title-main" style={{fontSize: '32px'}}>¡Árbol de Decisión Completado!</h2>
            <p className="subtitle-main">Has aplicado correctamente los conceptos de seguridad en las situaciones presentadas</p>
            <div className="info-box" style={{maxWidth: '600px'}}>
              <h4>Lo que aprendiste:</h4>
              <p>• La seguridad es responsabilidad compartida</p>
              <p>• Debes intervenir cuando veas a un compañero en riesgo</p>
              <p>• Las condiciones inseguras deben reportarse y corregirse inmediatamente</p>
              <p>• No normalizar situaciones de riesgo</p>
            </div>
            <button className="btn btn-primary" onClick={onNext}>Ir a la Evaluación</button>
          </div>
        );
      }

      const node = currentNode || nodes[0];

      return (
        <div className="screen">
          <h2 className="title-main" style={{fontSize: '32px'}}>Árbol de Decisión</h2>
          <p className="subtitle-main">Aplica lo aprendido tomando decisiones en situaciones reales de trabajo</p>
          <div className="decision-tree">
            <div className="decision-node">
              <p className="decision-question">{node.question}</p>
              {node.result ? (
                <div className="decision-result">
                  <h3 className="result-title">{node.result.title}</h3>
                  <p className="result-text">{node.result.message}</p>
                </div>
              ) : (
                <div className="decision-options">
                  {node.options.map((opt, i) => (
                    <button key={i} className="decision-btn" onClick={() => handleOptionClick(opt)}>{opt.text}</button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }
    
    // Componente: Quiz Interactivo
    function QuizScreen({ onComplete }) {
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [answered, setAnswered] = useState(false);
      const [feedback, setFeedback] = useState(null);

      const handleAnswer = (optionIndex) => {
        if (answered) return;
        setAnswered(true);
        const isCorrect = optionIndex === STRATEGY_DATA.quiz[currentQ].correct;
        if (isCorrect) setScore(score + 1);
        setFeedback(isCorrect ? STRATEGY_DATA.quiz[currentQ].feedback : `Incorrecto. ${STRATEGY_DATA.quiz[currentQ].feedback}`);
      };

      const nextQuestion = () => {
        if (currentQ < STRATEGY_DATA.quiz.length - 1) {
          setCurrentQ(currentQ + 1);
          setAnswered(false);
          setFeedback(null);
        } else {
          onComplete(score + (answered && STRATEGY_DATA.quiz[currentQ].correct === currentQ ? 0 : 0));
        }
      };

      const question = STRATEGY_DATA.quiz[currentQ];

      return (
        <div className="screen">
          <h2 className="title-main" style={{fontSize: '32px'}}>Evaluación de Conocimientos</h2>
          <p className="subtitle-main">Pregunta {currentQ + 1} de {STRATEGY_DATA.quiz.length}</p>
          <div className="progress-bar">
            <div className="progress-fill" style={{width: `${((currentQ + 1) / STRATEGY_DATA.quiz.length) * 100}%`}}></div>
          </div>
          <div className="card" style={{maxWidth: '600px'}}>
            <p className="card-title">{question.question}</p>
            <div className="quiz-options">
              {question.options.map((opt, i) => {
                let className = 'quiz-option';
                if (answered) {
                  if (i === question.correct) className += ' correct';
                  else if (i !== question.correct) className += ' incorrect';
                }
                return (
                  <button key={i} className={className} onClick={() => handleAnswer(i)} disabled={answered}>{opt}</button>
                );
              })}
            </div>
            {feedback && (
              <div className={`feedback ${feedback.includes('Correcto') ? 'correct' : 'incorrect'}`}>
                {feedback}
              </div>
            )}
          </div>
          {answered && (
            <button className="btn btn-primary" onClick={nextQuestion}>
              {currentQ < STRATEGY_DATA.quiz.length - 1 ? 'Siguiente' : 'Ver Resultados'}
            </button>
          )}
        </div>
      );
    }

    // Componente: Resultados
    function ResultsScreen({ score, onRestart }) {
      const total = STRATEGY_DATA.quiz.length;
      const percentage = Math.round((score / total) * 100);
      let message = '';
      if (percentage >= 80) message = '¡Excelente! Demuestras un gran conocimiento de la estrategia SSO.';
      else if (percentage >= 60) message = 'Bien, pero te recomendamos repasar los conceptos para alcanzar la excelencia.';
      else message = 'Te sugerimos volver a revisar el material y reforzar los conceptos clave.';

      return (
        <div className="screen">
          <div className="logo-container">
            <div className="logo-text">CODELCO</div>
          </div>
          <h2 className="title-main" style={{fontSize: '32px'}}>Resultados de la Evaluación</h2>
          <p className="subtitle-main">Tu puntuación en la estrategia SSO</p>
          <div className="score-display">{score} / {total}</div>
          <p className="score-message">{percentage}% - {message}</p>
          <div className="info-box" style={{maxWidth: '600px'}}>
            <h4>Para seguir aprendiendo:</h4>
            <p>• Visita: <a href="https://www.codelco.com/sustentabilidad/lanzamos-nueva-estrategia-de-seguridad-y-salud-ocupacional" target="_blank" style={{color: '#FF6B00'}}>codelco.com - Nueva Estrategia SSO</a></p>
            <p>• Consulta el PDF de Seguridad y Salud Ocupacional 2021</p>
            <p>• Aplica los 4 pilares en tu trabajo diario</p>
          </div>
          <div style={{display: 'flex', gap: '16px'}}>
            <button className="btn btn-primary" onClick={onRestart}>Reiniciar Presentación</button>
          </div>
        </div>
      );
    }
    
    // Componente Principal App
    function App() {
      const [screen, setScreen] = useState('welcome');
      const [finalScore, setFinalScore] = useState(0);

      const start = () => setScreen('video');
      const nextVideo = () => setScreen('pillars');
      const nextPillars = () => setScreen('decision');
      const nextDecision = () => setScreen('quiz');
      const finishQuiz = (s) => { setFinalScore(s); setScreen('results'); };
      const restart = () => { setScreen('welcome'); setFinalScore(0); };

      return (
        <>
          {screen === 'welcome' && <WelcomeScreen onStart={start} />}
          {screen === 'video' && <VideoScreen onNext={nextVideo} />}
          {screen === 'pillars' && <PillarsScreen onNext={nextPillars} />}
          {screen === 'decision' && <DecisionTreeScreen onNext={nextDecision} />}
          {screen === 'quiz' && <QuizScreen onComplete={finishQuiz} />}
          {screen === 'results' && <ResultsScreen score={finalScore} onRestart={restart} />}
        </>
      );
    }

    // Renderizar la aplicación
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
